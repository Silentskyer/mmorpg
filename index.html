<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>文字 MMORPG</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <h1>文字 MMORPG</h1>
        <p>單機網頁冒險版</p>
      </div>
      <div class="menu" id="menu"></div>
      <div class="save-note">
        <span>存檔方式</span>
        <strong>瀏覽器本機保存</strong>
      </div>
    </aside>

    <main class="main">
      <section class="topbar">
        <div>
          <p class="eyebrow">Click To Play</p>
          <h2>資料驅動的文字冒險</h2>
        </div>
        <div class="hero-actions" id="hero-actions"></div>
      </section>

      <section class="panel" id="app"></section>
    </main>
  </div>

  <template id="menu-button-template">
    <button class="menu-button" type="button"></button>
  </template>

  <script src="./app.js"></script>
</body>
</html>
